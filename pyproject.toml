[project]
name = "mypkg"
version = "0.1.0"
description = "Reproducible ML workflow demo: every run is bound to a specific git commit."
requires-python = ">=3.10"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mypkg"]
