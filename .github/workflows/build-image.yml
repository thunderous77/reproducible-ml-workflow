name: Build & Push Runtime Image

# Path-filtered: this workflow runs only when the runtime contract changes
# (Dockerfile / pyproject.toml deps / this workflow itself). Code-only
# commits don't trigger an image rebuild — that's the whole point of
# splitting code and runtime onto separate channels.
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'pyproject.toml'
      - '.github/workflows/build-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

concurrency:
  group: build-image
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute deps tag
        id: tags
        run: |
          set -euo pipefail
          # Short-SHA based tag so historical pinning is possible.
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEPS_TAG="deps-${SHORT_SHA}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/mypkg-runtime"
          echo "deps_tag=${DEPS_TAG}"   >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}"          >> "$GITHUB_OUTPUT"
          echo "Will publish:"
          echo "  ${IMAGE}:latest"
          echo "  ${IMAGE}:${DEPS_TAG}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # arm64 is emulated via QEMU on the amd64 GH runner — slower but
          # zero-config. Switch to native arm64 runners later if build time
          # becomes a bottleneck.
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.deps_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Runtime image
          - \`${{ steps.tags.outputs.image }}:latest\`
          - \`${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.deps_tag }}\`

          Deps changed → image rebuilt. Code-only commits do not trigger this workflow.
          EOF
