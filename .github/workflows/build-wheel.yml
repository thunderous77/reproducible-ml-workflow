name: Build & Release Wheel

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-wheel
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # rev-list --count needs full history

      - name: Compute version
        id: ver
        run: |
          set -euo pipefail
          COUNT=$(git rev-list --count HEAD)
          SHA=$(git rev-parse HEAD)
          BRANCH="${GITHUB_REF_NAME}"
          BUILD_VERSION="0.1.${COUNT}"
          TAG="v${BUILD_VERSION}"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"                     >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"                     >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"               >> "$GITHUB_OUTPUT"
          echo "Build version: ${BUILD_VERSION} (sha ${SHA})"

      - name: Guard against tag collision (force-push protection)
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "::error::Tag ${TAG} already exists on origin. A force-push has likely moved 'rev-list --count HEAD' backwards."
            echo "Resolve by either rolling history forward (a single empty commit on main) or by deleting the stale release+tag."
            exit 1
          fi

      - name: Bake version.py & pyproject.toml
        run: |
          set -euo pipefail
          cat > src/mypkg/version.py <<EOF
          # Auto-generated by .github/workflows/build-wheel.yml — do not edit.
          git_hash = "${{ steps.ver.outputs.sha }}"
          git_branch = "${{ steps.ver.outputs.branch }}"
          build_version = "${{ steps.ver.outputs.build_version }}"
          EOF
          # macOS sed differs from GNU sed; CI runs Linux so plain -i is fine.
          sed -i 's/^version = "[^"]*"/version = "${{ steps.ver.outputs.build_version }}"/' pyproject.toml
          echo "--- src/mypkg/version.py ---"
          cat src/mypkg/version.py
          echo "--- pyproject.toml (version line) ---"
          grep '^version' pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build wheel
        run: |
          set -euo pipefail
          uv build --wheel
          ls -la dist/

      - name: Create release & upload wheel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          SHA: ${{ steps.ver.outputs.sha }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" \
            --target "${SHA}" \
            --title "${TAG}" \
            --notes "Auto-built from ${SHA} on branch ${{ steps.ver.outputs.branch }}." \
            dist/*.whl
          echo "Released ${TAG} from ${SHA}"
